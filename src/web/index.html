<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fossil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; font-size: 14px; color: #e0e0e0; background: #1a1a1a; padding: 2rem; max-width: 900px; }
    h1 { font-size: 1.2rem; margin-bottom: 1rem; color: #888; }
    h2 { font-size: 1rem; margin: 1.5rem 0 0.5rem; color: #aaa; }
    a { color: #7aafff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .breadcrumb { margin-bottom: 1rem; color: #666; }
    .breadcrumb a { color: #888; }
    .desc { color: #666; margin-left: 1rem; }
    ul { list-style: none; }
    li { padding: 0.2rem 0; }
    table { border-collapse: collapse; margin-top: 0.5rem; }
    th, td { text-align: left; padding: 0.2rem 1rem 0.2rem 0; }
    th { color: #888; font-weight: normal; }
    td { color: #ccc; }
    pre { background: #111; padding: 1rem; overflow: auto; margin-top: 0.5rem; font-size: 13px; color: #ccc; max-height: 400px; }
    .box { background: #111; padding: 1rem; margin-top: 0.5rem; overflow: auto; max-height: 400px; position: relative; }
    .box table { margin-top: 0; }
    .boxwrap { position: relative; margin-top: 0.5rem; }
    .copy-btn { position: absolute; top: 0.4rem; right: 0.4rem; background: #333; color: #aaa; border: none; padding: 0.2rem 0.5rem; font-family: monospace; font-size: 12px; cursor: pointer; z-index: 1; }
    .copy-btn:hover { background: #444; color: #ccc; }
    .tag { color: #888; background: #252525; padding: 0.1rem 0.4rem; font-size: 12px; }
    #view { min-height: 200px; }
  </style>
</head>
<body>
  <h1>fossil</h1>
  <div id="view"></div>
  <script>
function $(sel) { return document.querySelector(sel); }

async function api(path) {
  let r = await fetch('/api' + path);
  if (!r.ok) return null;
  return r.json();
}

function el(tag, attrs, ...children) {
  let e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'onclick') e.addEventListener('click', v);
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  });
  return e;
}

function render(...nodes) {
  let v = $('#view');
  v.innerHTML = '';
  nodes.forEach(n => v.appendChild(n));
}

function fmtTime(iso) {
  let d = new Date(iso);
  let mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  let day = d.getDate();
  let h = String(d.getHours()).padStart(2, '0');
  let m = String(d.getMinutes()).padStart(2, '0');
  return mon + ' ' + day + ' ' + d.getFullYear() + ' ' + h + ':' + m;
}

function link(text, onclick) {
  return el('a', { href: '#', onclick: e => { e.preventDefault(); onclick(); } }, text);
}

function copyBox(content, child) {
  let btn = el('button', { class: 'copy-btn', onclick: async () => {
    await navigator.clipboard.writeText(content);
    btn.textContent = 'copied';
    setTimeout(() => btn.textContent = 'copy', 1500);
  }}, 'copy');
  return el('div', { class: 'boxwrap' }, btn, child);
}

function breadcrumb(...parts) {
  let bc = el('div', { class: 'breadcrumb' });
  parts.forEach((p, i) => {
    if (i > 0) bc.appendChild(document.createTextNode(' / '));
    if (p.fn) bc.appendChild(link(p.text, p.fn));
    else bc.appendChild(document.createTextNode(p.text));
  });
  return bc;
}

async function showProjects() {
  let projects = await api('/projects');
  if (!projects) return render(el('p', {}, 'failed to load projects'));
  let ul = el('ul', {});
  projects.forEach(p => {
    let li = el('li', {},
      link(p.name, () => showFossils(p.name)),
      p.description ? el('span', { class: 'desc' }, p.description) : null
    );
    ul.appendChild(li);
  });
  render(
    breadcrumb({ text: 'projects' }),
    el('h2', {}, 'projects'),
    ul
  );
}

async function showFossils(project) {
  let fossils = await api('/projects/' + project + '/fossils');
  if (!fossils) return render(el('p', {}, 'not found'));
  let ul = el('ul', {});
  fossils.forEach(f => {
    let tags = Object.keys(f.variants || {});
    let li = el('li', {},
      link(f.name, () => showFossilDetail(project, f.name)),
      f.description ? el('span', { class: 'desc' }, f.description) : null,
      tags.length ? el('span', { class: 'desc' },
        ' [', tags.map(t => el('span', { class: 'tag' }, t)).reduce((a, b) => {
          let f = document.createDocumentFragment();
          f.appendChild(a);
          f.appendChild(document.createTextNode(' '));
          f.appendChild(b);
          return f;
        }), ']'
      ) : null
    );
    ul.appendChild(li);
  });
  render(
    breadcrumb({ text: 'projects', fn: showProjects }, { text: project }),
    el('h2', {}, project + ' / fossils'),
    ul
  );
}

async function showFossilDetail(project, fossil) {
  let base = '/projects/' + project + '/fossils/' + fossil;
  let [analyses, records] = await Promise.all([
    api(base + '/analyses'),
    api(base + '/records'),
  ]);
  let bc = breadcrumb(
    { text: 'projects', fn: showProjects },
    { text: project, fn: () => showFossils(project) },
    { text: fossil }
  );
  let nodes = [bc];
  if (analyses && analyses.length) {
    let ul = el('ul', {});
    analyses.forEach(a => {
      ul.appendChild(el('li', {},
        link(a.name, () => showAnalysis(project, fossil, a.name))
      ));
    });
    nodes.push(el('h2', {}, fossil + ' / analyses'));
    nodes.push(ul);
  }
  if (records && records.length) {
    let tbl = el('table', {});
    tbl.appendChild(el('tr', {},
      el('th', {}, 'timestamp'),
      el('th', {}, 'variant'),
      el('th', {}, 'commit'),
      el('th', {}, 'iters')
    ));
    records.forEach(r => {
      tbl.appendChild(el('tr', {},
        el('td', {}, link(fmtTime(r.timestamp), () => showRecord(project, fossil, r.id))),
        el('td', {}, r.variant || '-'),
        el('td', {}, el('span', { class: 'tag' }, r.commit)),
        el('td', {}, String(r.iterations))
      ));
    });
    nodes.push(el('h2', {}, fossil + ' / records'));
    nodes.push(tbl);
  }
  if ((!analyses || !analyses.length) && (!records || !records.length)) {
    nodes.push(el('p', {}, 'no analyses or records'));
  }
  render(...nodes);
}

async function showAnalysis(project, fossil, name) {
  let data = await api('/projects/' + project + '/fossils/' + fossil + '/analyses/' + name);
  if (!data) return render(el('p', {}, 'not found'));
  render(
    breadcrumb(
      { text: 'projects', fn: showProjects },
      { text: project, fn: () => showFossils(project) },
      { text: fossil, fn: () => showFossilDetail(project, fossil) },
      { text: name }
    ),
    el('h2', {}, name),
    el('pre', {}, data.content)
  );
}

async function showRecord(project, fossil, id) {
  let base = '/projects/' + project + '/fossils/' + fossil;
  let [data, analyses] = await Promise.all([
    api(base + '/records/' + id),
    api(base + '/analyses'),
  ]);
  if (!data) return render(el('p', {}, 'not found'));
  let m = data.manifest;
  let tbl = el('table', {},
    el('tr', {}, el('th', {}, 'timestamp'), el('td', {}, m.timestamp)),
    el('tr', {}, el('th', {}, 'variant'), el('td', {}, m.variant || '-')),
    el('tr', {}, el('th', {}, 'commit'), el('td', {}, m.git.commit)),
    el('tr', {}, el('th', {}, 'branch'), el('td', {}, m.git.branch)),
    el('tr', {}, el('th', {}, 'command'), el('td', {}, m.command)),
    el('tr', {}, el('th', {}, 'iterations'), el('td', {}, String(m.iterations))),
    el('tr', {}, el('th', {}, 'kernel'), el('td', {}, m.kernel)),
    el('tr', {}, el('th', {}, 'cpu core'), el('td', {}, m.cpu.pinned_core)),
    el('tr', {}, el('th', {}, 'governor'), el('td', {}, m.cpu.governor)),
    el('tr', {}, el('th', {}, 'boost'), el('td', {}, String(m.cpu.boost)))
  );

  let analysisSection = el('div', {});
  if (analyses && analyses.length) {
    let resultsBox = el('div', {});
    let buttons = el('div', { style: 'margin-top: 0.5rem' });
    analyses.forEach(a => {
      let btn = link(a.name, async () => {
        resultsBox.innerHTML = '';
        resultsBox.appendChild(el('p', { style: 'color: #666; padding: 0.5rem' }, 'running...'));
        let result = await api(base + '/records/' + id + '/analyze/' + a.name);
        resultsBox.innerHTML = '';
        if (!result) {
          resultsBox.appendChild(el('p', { style: 'color: #c66' }, 'analysis failed'));
          return;
        }
        let container = el('div', {});
        let lines = [];
        let fmtVal = v => typeof v === 'object' && v !== null && v.mean !== undefined ? v.mean.toFixed(1) : String(v);
        for (let [tname, rows] of Object.entries(result.tables || {})) {
          if (!Array.isArray(rows) || !rows.length) continue;
          let cols = Object.keys(rows[0]);
          let tt = el('table', {}, el('tr', {}, ...cols.map(c => el('th', {}, c))));
          rows.forEach(row => {
            tt.appendChild(el('tr', {}, ...cols.map(c => el('td', {}, fmtVal(row[c])))));
            lines.push(cols.map(c => fmtVal(row[c])).join('\t'));
          });
          container.appendChild(el('p', { style: 'color: #888; margin-top: 0.5rem' }, tname));
          container.appendChild(tt);
        }
        for (let [k, v] of Object.entries(result.scalars || {}).sort(([a],[b]) => a.localeCompare(b))) {
          let row = el('tr', {}, el('td', {}, k), el('td', {}, fmtVal(v)));
          if (!container.querySelector('.scalar-table')) {
            let mt = el('table', { class: 'scalar-table' }, el('tr', {}, el('th', {}, 'metric'), el('th', {}, 'value')));
            container.appendChild(mt);
          }
          container.querySelector('.scalar-table').appendChild(row);
          lines.push(k + '\t' + fmtVal(v));
        }
        resultsBox.appendChild(copyBox(lines.join('\n'), el('div', { class: 'box' }, container)));
      });
      buttons.appendChild(el('span', { style: 'margin-right: 1.5rem' }, btn));
    });
    analysisSection.appendChild(el('h2', {}, 'analyze'));
    analysisSection.appendChild(buttons);
    analysisSection.appendChild(resultsBox);
  }

  let resultsJson = JSON.stringify(data.results, null, 2);

  render(
    breadcrumb(
      { text: 'projects', fn: showProjects },
      { text: project, fn: () => showFossils(project) },
      { text: fossil, fn: () => showFossilDetail(project, fossil) },
      { text: id }
    ),
    el('h2', {}, 'manifest'),
    tbl,
    analysisSection,
    el('h2', {}, 'results'),
    copyBox(resultsJson, el('pre', {}, resultsJson))
  );
}

showProjects();
  </script>
</body>
</html>
